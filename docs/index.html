<!DOCTYPE html>
<html lang="no">
  <head>
    <title>NRK Podcast RSS</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Uoffisielle RSS-feeder for NRK-podkaster med de siste episodene. For privat bruk." />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; font-src https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'none'">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
  </head>
  <body>

    <header>
      <div class="header-inner">
        <div class="brand-row">
          <div class="brand">
            <span class="signal-dot"></span>
            <h1>NRK Podcast RSS</h1>
          </div>
          <a href="https://github.com/jensbech/nrk-pod-feeds" class="gh-link" target="_blank" rel="noopener">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
            jensbech/nrk-pod-feeds
          </a>
        </div>
        <p class="tagline">Uoffisielle RSS-feeder for alle NRK-podkaster &mdash; oppdateres automatisk hver time.</p>
        <div class="stats-row">
          <div class="stat-pill active-pill">
            <span class="stat-dot"></span>
            <span id="count-active">—</span> aktive feeder
          </div>
          <div class="stat-pill">
            <span id="count-total">—</span> totalt
          </div>
          <div class="legend">
            <span class="leg leg-active">Aktiv</span>
            <span class="leg leg-inactive">Inaktiv</span>
            <span class="leg leg-obsolete">Over ett år</span>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" onkeyup="searchFeeds()" placeholder="Søk etter podkast…" autocomplete="off" spellcheck="false">
        <span class="search-count" id="searchCount"></span>
      </div>

      <div id="feeds_list"></div>

      <div class="empty-state" id="emptyState" hidden>
        <span class="empty-icon">◎</span>
        <p>Ingen treff. Prøv et annet søk.</p>
      </div>
    </main>

    <footer>
      <p>Uoffisiell. Innhold tilhører NRK og rettighetshavere. Kun for privat bruk.</p>
    </footer>

    <script type="text/javascript" src="feeds.js"></script>
    <script type="text/javascript" src="assets/js/main.js"></script>
  </body>
</html>
